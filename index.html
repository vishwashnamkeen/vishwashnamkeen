<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXE STORE | Premium Shopping Experience</title>
    <!-- Icons & Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0f172a;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --danger: #ef4444;
            --success: #10b981;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 16px;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Glassmorphism Header */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1.5rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--primary);
            cursor: pointer;
        }

        .logo span { color: var(--accent); }

        /* Search Bar */
        .search-container {
            flex-grow: 1;
            max-width: 500px;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.8rem;
            border-radius: 99px;
            border: 1px solid var(--border);
            background: #f1f5f9;
            outline: none;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .search-container input:focus {
            background: white;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .search-container i {
            position: absolute;
            left: 1.1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        /* Navigation Links / Tabs */
        .nav-tabs {
            display: flex;
            gap: 1rem;
            background: #f1f5f9;
            padding: 6px;
            border-radius: 99px;
        }

        .tab-btn {
            padding: 0.6rem 1.2rem;
            border: none;
            background: transparent;
            border-radius: 99px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.25s ease;
        }

        .tab-btn.active {
            background: white;
            color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        .tab-btn i { font-size: 1rem; }

        .badge-count {
            background: var(--accent);
            color: white;
            font-size: 0.75rem;
            padding: 2px 7px;
            border-radius: 99px;
            font-weight: 700;
        }

        .badge-count.wishlist-count {
            background: var(--danger);
        }

        /* Container & Sections */
        .main-content {
            max-width: 1280px;
            margin: 0 auto;
            width: 100%;
            padding: 2rem 1.5rem 5rem;
            flex-grow: 1;
        }

        .view-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .view-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Filter Chips */
        .category-filters {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }

        .filter-btn {
            padding: 0.5rem 1.25rem;
            border-radius: 99px;
            border: 1px solid var(--border);
            background: white;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .filter-btn.active, .filter-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Product Cards Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
        }

        .card-img-wrapper {
            position: relative;
            width: 100%;
            height: 250px;
            overflow: hidden;
            background: #f1f5f9;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover .card-img {
            transform: scale(1.08);
        }

        .like-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: white;
            border: none;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #cbd5e1;
            font-size: 1.1rem;
            transition: all 0.2s;
            z-index: 2;
        }

        .like-btn.active { color: var(--danger); }
        .like-btn:hover { transform: scale(1.1); }

        .card-body {
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-category {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 0.25rem;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        .card-footer {
            margin-top: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 1rem;
        }

        .price {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--primary);
        }

        .add-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.6rem 1.1rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .add-btn:hover {
            background: var(--accent);
        }

        /* Wishlist Page Specific Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 1rem;
        }

        .empty-state i {
            font-size: 4rem;
            color: #cbd5e1;
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .btn-shop {
            background: var(--accent);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 99px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        /* Cart Drawer Slide-Over */
        .cart-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(4px);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
        }

        .cart-overlay.open { opacity: 1; pointer-events: all; }

        .cart-drawer {
            position: fixed;
            top: 0;
            right: -420px;
            width: 100%;
            max-width: 420px;
            height: 100%;
            background: white;
            z-index: 201;
            box-shadow: -10px 0 30px rgba(0,0,0,0.15);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .cart-overlay.open .cart-drawer { transform: translateX(-420px); }

        .cart-header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-body {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1.25rem;
        }

        .cart-item {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.25rem;
            padding-bottom: 1.25rem;
            border-bottom: 1px solid var(--border);
        }

        .cart-item img {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            object-fit: cover;
        }

        .cart-item-details { flex-grow: 1; }
        .cart-item-title { font-weight: 600; font-size: 0.95rem; }
        .cart-item-price { font-weight: 700; color: var(--primary); margin-top: 4px; }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }

        .qty-btn {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: white;
            cursor: pointer;
            font-weight: 700;
        }

        .cart-footer {
            padding: 1.25rem;
            border-top: 1px solid var(--border);
            background: #f8fafc;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }

        .checkout-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
        }

        /* Notification Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--primary);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 300;
        }

        .toast.show { transform: translateY(0); opacity: 1; }

        @media (max-width: 768px) {
            header { flex-wrap: wrap; }
            .search-container { order: 3; width: 100%; max-width: 100%; }
        }
    </style>
</head>
<body>

    <!-- Header Navigation -->
    <header>
        <div class="logo" onclick="switchTab('shop')">LUXE<span>.</span></div>
        
        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Search products..." onkeyup="filterProducts()">
        </div>

        <div class="nav-tabs">
            <button class="tab-btn active" id="tab-shop" onclick="switchTab('shop')">
                <i class="fa-solid fa-store"></i> Shop
            </button>
            <button class="tab-btn" id="tab-wishlist" onclick="switchTab('wishlist')">
                <i class="fa-solid fa-heart"></i> Wishlist
                <span class="badge-count wishlist-count" id="wishlistBadge">0</span>
            </button>
            <button class="tab-btn" onclick="toggleCartDrawer(true)">
                <i class="fa-solid fa-bag-shopping"></i> Cart
                <span class="badge-count" id="cartBadge">0</span>
            </button>
        </div>
    </header>

    <main class="main-content">
        
        <!-- SHOP VIEW -->
        <section id="shopView" class="view-section active">
            <div class="category-filters">
                <button class="filter-btn active" onclick="filterCategory('All', this)">All Items</button>
                <button class="filter-btn" onclick="filterCategory('Electronics', this)">Electronics</button>
                <button class="filter-btn" onclick="filterCategory('Accessories', this)">Accessories</button>
                <button class="filter-btn" onclick="filterCategory('Fashion', this)">Fashion</button>
            </div>

            <div class="products-grid" id="shopGrid"></div>
        </section>

        <!-- DEDICATED WISHLIST TAB VIEW -->
        <section id="wishlistView" class="view-section">
            <h2 style="font-size: 1.8rem; font-weight: 800; margin-bottom: 1.5rem;">My Wishlist</h2>
            <div class="products-grid" id="wishlistGrid"></div>
            
            <div class="empty-state" id="wishlistEmpty" style="display: none;">
                <i class="fa-regular fa-heart"></i>
                <h3>Your Wishlist is Empty!</h3>
                <p>Explore our store and save your favorite items here.</p>
                <button class="btn-shop" onclick="switchTab('shop')">Explore Products</button>
            </div>
        </section>

    </main>

    <!-- Slide-over Cart Drawer -->
    <div class="cart-overlay" id="cartOverlay" onclick="toggleCartDrawer(false)">
        <div class="cart-drawer" onclick="event.stopPropagation()">
            <div class="cart-header">
                <h3>Shopping Bag</h3>
                <button class="qty-btn" onclick="toggleCartDrawer(false)"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="cart-body" id="cartItems"></div>
            <div class="cart-footer">
                <div class="total-row">
                    <span>Total Amount:</span>
                    <span id="cartTotal">₹0</span>
                </div>
                <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div class="toast" id="toast">
        <i class="fa-solid fa-circle-check" style="color: var(--success);"></i>
        <span id="toastMsg">Action completed!</span>
    </div>

    <script>
        // Database
        const products = [
            { id: 1, name: "Premium Wireless Headphones", category: "Electronics", price: 3499, image: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600&q=80" },
            { id: 2, name: "Minimalist Black Watch", category: "Accessories", price: 4999, image: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600&q=80" },
            { id: 3, name: "Smart Speaker Echo", category: "Electronics", price: 2899, image: "https://images.unsplash.com/photo-1589003077984-894e133dabab?w=600&q=80" },
            { id: 4, name: "Classic UV Sunglasses", category: "Fashion", price: 1599, image: "https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=600&q=80" },
            { id: 5, name: "Ultra-thin Mechanical Keyboard", category: "Electronics", price: 6200, image: "https://images.unsplash.com/photo-1587829741301-dc798b83add3?w=600&q=80" },
            { id: 6, name: "Genuine Leather Backpack", category: "Fashion", price: 3899, image: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=600&q=80" }
        ];

        // Application State
        let wishlist = [];
        let cart = [];
        let currentCategory = 'All';

        // Initialize UI
        window.addEventListener('DOMContentLoaded', () => {
            renderShop();
            updateBadges();
        });

        // Tab Navigation
        function switchTab(tab) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

            if(tab === 'shop') {
                document.getElementById('shopView').classList.add('active');
                document.getElementById('tab-shop').classList.add('active');
            } else if(tab === 'wishlist') {
                document.getElementById('wishlistView').classList.add('active');
                document.getElementById('tab-wishlist').classList.add('active');
                renderWishlist();
            }
        }

        // Render Shop Items
        function renderShop() {
            const grid = document.getElementById('shopGrid');
            const searchVal = document.getElementById('searchInput').value.toLowerCase();

            const filtered = products.filter(p => {
                const matchesCat = currentCategory === 'All' || p.category === currentCategory;
                const matchesSearch = p.name.toLowerCase().includes(searchVal);
                return matchesCat && matchesSearch;
            });

            grid.innerHTML = filtered.map(product => {
                const isLiked = wishlist.includes(product.id);
                return `
                    <div class="card">
                        <div class="card-img-wrapper">
                            <button class="like-btn ${isLiked ? 'active' : ''}" onclick="toggleWishlist(${product.id})">
                                <i class="fa-${isLiked ? 'solid' : 'regular'} fa-heart"></i>
                            </button>
                            <img src="${product.image}" alt="${product.name}" class="card-img">
                        </div>
                        <div class="card-body">
                            <span class="card-category">${product.category}</span>
                            <h3 class="card-title">${product.name}</h3>
                            <div class="card-footer">
                                <span class="price">₹${product.price.toLocaleString('en-IN')}</span>
                                <button class="add-btn" onclick="addToCart(${product.id})">
                                    <i class="fa-solid fa-cart-plus"></i> Add
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Render Wishlist Items Tab
        function renderWishlist() {
            const grid = document.getElementById('wishlistGrid');
            const emptyState = document.getElementById('wishlistEmpty');

            const wishlistProducts = products.filter(p => wishlist.includes(p.id));

            if(wishlistProducts.length === 0) {
                grid.innerHTML = '';
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
                grid.innerHTML = wishlistProducts.map(product => `
                    <div class="card">
                        <div class="card-img-wrapper">
                            <button class="like-btn active" onclick="toggleWishlist(${product.id})">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                            <img src="${product.image}" alt="${product.name}" class="card-img">
                        </div>
                        <div class="card-body">
                            <span class="card-category">${product.category}</span>
                            <h3 class="card-title">${product.name}</h3>
                            <div class="card-footer">
                                <span class="price">₹${product.price.toLocaleString('en-IN')}</span>
                                <button class="add-btn" onclick="addToCart(${product.id})">
                                    <i class="fa-solid fa-cart-plus"></i> Move To Cart
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        }

        // Toggle Wishlist Logic
        function toggleWishlist(id) {
            const idx = wishlist.indexOf(id);
            const product = products.find(p => p.id === id);

            if(idx === -1) {
                wishlist.push(id);
                showToast(`"${product.name}" added to Wishlist!`);
            } else {
                wishlist.splice(idx, 1);
                showToast(`Removed from Wishlist.`);
            }

            updateBadges();
            renderShop();
            renderWishlist();
        }

        // Cart Drawer Operations
        function addToCart(id) {
            const existing = cart.find(item => item.id === id);
            const product = products.find(p => p.id === id);

            if(existing) {
                existing.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }

            showToast(`Added "${product.name}" to Cart!`);
            updateBadges();
            renderCartDrawer();
        }

        function updateQty(id, change) {
            const item = cart.find(i => i.id === id);
            if(item) {
                item.qty += change;
                if(item.qty <= 0) {
                    cart = cart.filter(i => i.id !== id);
                }
            }
            updateBadges();
            renderCartDrawer();
        }

        function renderCartDrawer() {
            const container = document.getElementById('cartItems');
            const totalEl = document.getElementById('cartTotal');

            if(cart.length === 0) {
                container.innerHTML = `<p style="text-align:center; color: var(--text-muted); margin-top:2rem;">Your cart is empty.</p>`;
                totalEl.innerText = `₹0`;
                return;
            }

            let total = 0;
            container.innerHTML = cart.map(item => {
                total += item.price * item.qty;
                return `
                    <div class="cart-item">
                        <img src="${item.image}" alt="${item.name}">
                        <div class="cart-item-details">
                            <div class="cart-item-title">${item.name}</div>
                            <div class="cart-item-price">₹${(item.price * item.qty).toLocaleString('en-IN')}</div>
                            <div class="qty-controls">
                                <button class="qty-btn" onclick="updateQty(${item.id}, -1)">-</button>
                                <span>${item.qty}</span>
                                <button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            totalEl.innerText = `₹${total.toLocaleString('en-IN')}`;
        }

        function toggleCartDrawer(open) {
            document.getElementById('cartOverlay').classList.toggle('open', open);
            if(open) renderCartDrawer();
        }

        function checkout() {
            if(cart.length === 0) return alert("Your cart is empty!");
            alert("Order placed successfully! Thank you for shopping with us.");
            cart = [];
            updateBadges();
            toggleCartDrawer(false);
        }

        // Filters & Searches
        function filterCategory(category, element) {
            currentCategory = category;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            element.classList.add('active');
            renderShop();
        }

        function filterProducts() {
            renderShop();
        }

        // Utilities
        function updateBadges() {
            document.getElementById('wishlistBadge').innerText = wishlist.length;
            document.getElementById('cartBadge').innerText = cart.reduce((sum, item) => sum + item.qty, 0);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXE STORE | Premium Shopping Experience</title>
    <!-- Icons & Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- CSS File Link -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Navigation -->
    <header>
        <div class="logo" onclick="switchTab('shop')">LUXE<span>.</span></div>
        
        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Search products..." onkeyup="filterProducts()">
        </div>

        <div class="nav-tabs">
            <button class="tab-btn active" id="tab-shop" onclick="switchTab('shop')">
                <i class="fa-solid fa-store"></i> Shop
            </button>
            <button class="tab-btn" id="tab-wishlist" onclick="switchTab('wishlist')">
                <i class="fa-solid fa-heart"></i> Wishlist
                <span class="badge-count wishlist-count" id="wishlistBadge">0</span>
            </button>
            <button class="tab-btn" onclick="toggleCartDrawer(true)">
                <i class="fa-solid fa-bag-shopping"></i> Cart
                <span class="badge-count" id="cartBadge">0</span>
            </button>
        </div>
    </header>

    <main class="main-content">
        
        <!-- SHOP VIEW -->
        <section id="shopView" class="view-section active">
            <div class="category-filters">
                <button class="filter-btn active" onclick="filterCategory('All', this)">All Items</button>
                <button class="filter-btn" onclick="filterCategory('Electronics', this)">Electronics</button>
                <button class="filter-btn" onclick="filterCategory('Accessories', this)">Accessories</button>
                <button class="filter-btn" onclick="filterCategory('Fashion', this)">Fashion</button>
            </div>

            <div class="products-grid" id="shopGrid"></div>
        </section>

        <!-- WISHLIST TAB VIEW -->
        <section id="wishlistView" class="view-section">
            <h2 style="font-size: 1.8rem; font-weight: 800; margin-bottom: 1.5rem;">My Wishlist</h2>
            <div class="products-grid" id="wishlistGrid"></div>
            
            <div class="empty-state" id="wishlistEmpty" style="display: none;">
                <i class="fa-regular fa-heart"></i>
                <h3>Your Wishlist is Empty!</h3>
                <p>Explore our store and save your favorite items here.</p>
                <button class="btn-shop" onclick="switchTab('shop')">Explore Products</button>
            </div>
        </section>

    </main>

    <!-- Slide-over Cart Drawer -->
    <div class="cart-overlay" id="cartOverlay" onclick="toggleCartDrawer(false)">
        <div class="cart-drawer" onclick="event.stopPropagation()">
            <div class="cart-header">
                <h3>Shopping Bag</h3>
                <button class="qty-btn" onclick="toggleCartDrawer(false)"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="cart-body" id="cartItems"></div>
            <div class="cart-footer">
                <div class="total-row">
                    <span>Total Amount:</span>
                    <span id="cartTotal">₹0</span>
                </div>
                <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div class="toast" id="toast">
        <i class="fa-solid fa-circle-check" style="color: var(--success);"></i>
        <span id="toastMsg">Action completed!</span>
    </div>

    <!-- JS File Link -->
    <script src="script.js"></script>
</body>
</html>
    </script>
</body>
</html>
